<div class="login-container">
<mat-card class="login-card">
<mat-card-header>
<mat-card-title>Acceso al Sistema (SaaS AI)</mat-card-title>
</mat-card-header>
<mat-card-content class="form-content">
<mat-form-field appearance="outline">
<mat-label>Correo electrónico</mat-label>
<input matInput placeholder="ejemplo@univo.edu">
</mat-form-field>
<mat-form-field appearance="outline">
<mat-label>Contraseña</mat-label>
<input matInput type="password">
</mat-form-field>
</mat-card-content>
<mat-card-actions>
<!-- (click) ejecuta la función en nuestro archivo TypeScript -->
<button mat-raised-button color="primary"
(click)="ingresarSistema()">Ingresar</button>
</mat-card-actions>
</mat-card>
</div>

<mat-card class="welcome-card">
  <mat-card-header>
    <mat-card-title>Mis Documentos</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="(documentos$ | async) ?? []" class="mat-elevation-z1">

      <ng-container matColumnDef="titulo">
        <th mat-header-cell *matHeaderCellDef>Título</th>
        <td mat-cell *matCellDef="let doc">{{ doc.titulo }}</td>
      </ng-container>

      <ng-container matColumnDef="materia">
        <th mat-header-cell *matHeaderCellDef>Materia</th>
        <td mat-cell *matCellDef="let doc">{{ doc.materia }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnasVisibles"></tr>
      <tr mat-row *matRowDef="let row; columns: columnasVisibles;"></tr>
    </table>
  </mat-card-content>
</mat-card>
